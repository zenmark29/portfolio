<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenmark Portfolio Manager</title>
    <meta name="description" content="Offline-first modern portfolio management and rebalancing engine.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-background"></div>
    
    <main class="container">
        <header class="app-header">
            <h1>Portfolio <span>Manager</span></h1>
            <button id="updatePricesBtn" class="btn btn-secondary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.59-9.15l5.59-4.8"/></svg>
                Sync EOD Prices
            </button>
        </header>

        <section class="hero-stats">
            <div class="stat-card glass primary-accent">
                <span class="stat-label">Total Portfolio Value</span>
                <h2 id="totalValue">$0.00</h2>
            </div>
            <div class="stat-card glass">
                <span class="stat-label">Expected Target Alignment</span>
                <h2 id="actualPercentageSum">0.00%</h2>
            </div>
        </section>
        
        <div class="error-banner" id="errorBanner" style="display: none;"></div>

        <div class="grid-layout">
            <section class="investments-panel glass">
                <div class="panel-header">
                    <h3>Holding Allocations</h3>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Ticker</th>
                                <th>Shares</th>
                                <th>Price</th>
                                <th>Value</th>
                                <th>Alloc. (Target/Actual)</th>
                                <th>Rebalance Math</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="investmentsList">
                            <!-- Rows injected by app.js -->
                        </tbody>
                    </table>
                </div>
            </section>

            <section class="action-panel glass">
                <h3>Add Allocation</h3>
                <p class="subtitle">Allocations will be saved even if they don't add up to perfectly 100%, allowing you to add them one by one.</p>
                
                <form id="addInvestmentForm">
                    <div class="form-group">
                        <label for="ticker">Ticker Symbol</label>
                        <input type="text" id="ticker" name="ticker" placeholder="e.g. AAPL" required>
                    </div>
                    <div class="form-group">
                        <label for="shares">Shares Owned</label>
                        <input type="number" id="shares" name="shares" step="any" placeholder="0" required>
                    </div>
                    <div class="form-group">
                        <label for="targetPercentage">Target % (e.g. 0.25 for 25%)</label>
                        <input type="number" id="targetPercentage" name="targetPercentage" step="0.01" min="0" max="1" placeholder="0.25" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" id="addBtn">Update Portfolio</button>
                </form>
            </section>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
